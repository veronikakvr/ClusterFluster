name: clusterfluster
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - numpy>=1.24
  - pandas>=2.0
  - scikit-learn>=1.3
  - matplotlib>=3.7
  - seaborn>=0.13
  - scipy>=1.11
  - statsmodels>=0.14
  - networkx>=3.1
  - pip
  - pip:
    - umap-learn>=0.5
    - hdbscan>=0.8
    - scikit-posthocs>=0.8
    - scikit-bio>=0.5
    - pypalettes>=0.1
    - statannotations>=0.6
